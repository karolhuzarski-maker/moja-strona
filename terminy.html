<!doctype html>
<html lang="pl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terminy</title>
  <style>
    :root {
      --bg: #0b0c0f;
      --text: #f3f5ff;
      --radius: 16px;
      --shadow: 0 18px 60px rgba(0, 0, 0, .55);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        linear-gradient(rgba(11, 12, 15, .78), rgba(11, 12, 15, .78)),
        radial-gradient(1200px 700px at 70% -10%, rgba(209, 11, 11, .25), transparent 60%),
        radial-gradient(900px 600px at 20% 0%, rgba(255, 255, 255, .06), transparent 55%),
        var(--bg);
      padding: 20px;
    }

    .square {
      width: min(74vmin, 360px);
      aspect-ratio: 1 / 1;
      border-radius: var(--radius);
      border: 2px solid rgba(255, 255, 255, .35);
      background: linear-gradient(180deg, rgba(255, 255, 255, .08), rgba(255, 255, 255, .03));
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
      display: grid;
      align-content: center;
      gap: 14px;
      padding: 20px;
    }

    .title {
      text-align: center;
      font-size: clamp(1.2rem, 3.6vmin, 1.5rem);
      font-weight: 800;
      letter-spacing: .03em;
      text-transform: uppercase;
    }

    ul {
      margin: 0;
      padding-left: 22px;
      font-size: clamp(1rem, 2.9vmin, 1.15rem);
      line-height: 1.7;
    }
  </style>
</head>

<body>
  <div class="square">
    <div class="title">Terminy szkoleń</div>
    <ul>
      <li>Maj 2026</li>
      <li>Czerwiec 2026</li>
      <li>Lipiec 2026</li>
    </ul>
  </div>
</body>

</html>
