<!doctype html>
<html lang="pl">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terminy</title>
  <style>
    :root {
      --bg: #0b0c0f;
      --card: #11131a;
      --text: #f3f5ff;
      --line: rgba(255, 255, 255, .10);
      --radius: 16px;
      --shadow: 0 18px 60px rgba(0, 0, 0, .55);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, Helvetica, sans-serif;
      color: var(--text);
      background:
        linear-gradient(rgba(11, 12, 15, .78), rgba(11, 12, 15, .78)),
        radial-gradient(1200px 700px at 70% -10%, rgba(209, 11, 11, .25), transparent 60%),
        radial-gradient(900px 600px at 20% 0%, rgba(255, 255, 255, .06), transparent 55%),
        var(--bg);
    }

    .square {
      width: min(74vmin, 360px);
      aspect-ratio: 1 / 1;
      border-radius: var(--radius);
      border: 1px solid var(--line);
      background: linear-gradient(180deg, rgba(255, 255, 255, .04), rgba(255, 255, 255, .02));
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
      display: grid;
      place-items: center;
      font-size: clamp(1.1rem, 3.4vmin, 1.35rem);
      font-weight: 700;
      letter-spacing: .02em;
      text-transform: uppercase;
    }
  </style>
</head>

<body>
  <div class="square">Terminy</div>
</body>

</html>
