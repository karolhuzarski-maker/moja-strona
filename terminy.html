<!doctype html>
<html lang="pl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>H-CORE edu | Terminy</title>
  <style>
    :root {
      --bg: #0b0c0f;
      --card: #11131a;
      --muted: #a9b0c0;
      --text: #f3f5ff;
      --red: #d10b0b;
      --line: rgba(255, 255, 255, .10);
      --shadow: 0 18px 60px rgba(0, 0, 0, .55);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, Helvetica, sans-serif;
      background:
        linear-gradient(rgba(11, 12, 15, .72), rgba(11, 12, 15, .72)),
        radial-gradient(1200px 700px at 70% -10%, rgba(209, 11, 11, .25), transparent 60%),
        radial-gradient(900px 600px at 20% 0%, rgba(255, 255, 255, .06), transparent 55%),
        var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .wrap {
      max-width: 1240px;
      margin: 0 auto;
      padding: 16px;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    .card {
      width: min(92vw, 420px);
      aspect-ratio: 1 / 1;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255, 255, 255, .04), rgba(255, 255, 255, .02));
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
      padding: 22px;
      display: grid;
      align-content: center;
      gap: 12px;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.2rem, 3vw, 1.6rem);
    }

    ul {
      margin: 0;
      padding-left: 20px;
      color: var(--muted);
    }
  </style>
</head>

<body>
  <main class="wrap">
    <section class="card" aria-label="Terminy szkoleń">
      <h1>Terminy</h1>
      <ul>
        <li>Aktualne terminy podawane są na Facebooku i mailowo.</li>
      </ul>
    </section>
  </main>
</body>

</html>
