<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terminy</title>
  <style>
    :root { color-scheme: light; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
    }
    .square {
      width: min(70vmin, 320px);
      aspect-ratio: 1 / 1;
      border: 3px solid #38bdf8;
      border-radius: 16px;
      display: grid;
      place-items: center;
      font-size: clamp(1rem, 3.2vmin, 1.25rem);
      font-weight: 700;
      letter-spacing: .02em;
      background: rgba(56, 189, 248, 0.08);
      box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.3) inset;
    }
  </style>
</head>
<body>
  <div class="square">Terminy wkrótce</div>
</body>
</html>
