<!doctype html>
<html lang="pl">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>H-CORE edu | Terminy</title>
  <style>
    :root {
      --bg: #0b0c0f;
      --muted: #a9b0c0;
      --text: #f3f5ff;
      --line: rgba(255, 255, 255, .10);
      --shadow: 0 18px 60px rgba(0, 0, 0, .55);
      --radius: 16px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, Helvetica, sans-serif;
      background:
        linear-gradient(rgba(11, 12, 15, .72), rgba(11, 12, 15, .72)),
        radial-gradient(1200px 700px at 70% -10%, rgba(209, 11, 11, .25), transparent 60%),
        radial-gradient(900px 600px at 20% 0%, rgba(255, 255, 255, .06), transparent 55%),
        var(--bg);
      color: var(--text);
      line-height: 1.5;
    }

    .wrap {
      max-width: 1240px;
      margin: 0 auto;
      padding: 24px 16px;
      min-height: 100vh;
      display: grid;
      place-items: center;
    }

    .grid {
      width: min(100%, 900px);
      display: grid;
      grid-template-columns: repeat(2, minmax(240px, 1fr));
      gap: 16px;
    }

    .card {
      min-height: 300px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: linear-gradient(180deg, rgba(255, 255, 255, .04), rgba(255, 255, 255, .02));
      box-shadow: var(--shadow);
      backdrop-filter: blur(6px);
      padding: 22px;
      display: grid;
      align-content: center;
      gap: 10px;
    }

    h1, h2 { margin: 0; }

    p {
      margin: 0;
      color: var(--muted);
    }

    @media (max-width: 700px) {
      .grid { grid-template-columns: 1fr; }
      .card { min-height: 220px; }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <section class="grid" aria-label="Terminy szkoleń">
      <article class="card">
        <h1>Terminy</h1>
        <p>Najbliższe terminy publikujemy na bieżąco.</p>
      </article>

      <article class="card">
        <h2>Zapisy</h2>
        <p>Napisz do nas, aby otrzymać aktualny harmonogram.</p>
      </article>
    </section>
  </main>
</body>

</html>
