<!doctype html>
<html lang="pl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>News | H-CORE edu</title>
  <style>
    body {
      margin: 0;
      font-family: system-ui;
      background:
        linear-gradient(rgba(11, 12, 15, .72), rgba(11, 12, 15, .72)),
        url("medic cbs.png") center/cover no-repeat fixed,
        radial-gradient(1200px 700px at 70% -10%, rgba(209, 11, 11, .25), transparent 60%),
        radial-gradient(900px 600px at 20% 0%, rgba(255, 255, 255, .06), transparent 55%),
        #0b0c0f;
      color: #f3f5ff;
    }
    .wrap { max-width: 1100px; margin: 0 auto; padding: 16px; }
    .top { display: flex; justify-content: space-between; align-items: center; gap: 12px; border: 1px solid rgba(255,255,255,.15); border-radius: 14px; padding: 16px; background: rgba(255,255,255,.03); }
    .top img { width: 280px; max-width: 100%; }
    .nav { display: flex; gap: 10px; flex-wrap: wrap; }
    .nav a { padding: 10px 12px; border: 1px solid rgba(255,255,255,.15); border-radius: 10px; color: #fff; text-decoration: none; }
    .grid { margin-top: 16px; display: grid; grid-template-columns: 1fr; gap: 14px; }
    .card { padding: 18px; border: 1px solid rgba(255,255,255,.15); border-radius: 14px; background: rgba(255,255,255,.03); }
      .news-link { display: block; color: inherit; text-decoration: none; }
    .news-link .card { transition: transform .2s ease, border-color .2s ease, background .2s ease; }
    .news-link:hover .card { transform: translateY(-2px); border-color: rgba(255,255,255,.3); background: rgba(255,255,255,.06); }
    .news-thumb {
      background:
        linear-gradient(rgba(11, 12, 15, .58), rgba(11, 12, 15, .72)),
        url("672467274_122118295113240909_8681924136325612474_n (1).jpg") right center/contain no-repeat;
      background-color: rgba(11, 12, 15, .72);
      min-height: 140px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    .news-thumb h3,
    .news-thumb p {
      text-shadow: 0 1px 2px rgba(0,0,0,.6);
      max-width: 62ch;
    }
</style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <a href="index.html"><img src="new llogo full core.png" alt="H-CORE edu" /></a>
      <nav class="nav">
        <a href="onas.html">O nas</a>
        <a href="szkolenia.html">Szkolenia</a>
        <a href="kontakt.html">Kontakt</a>
        <a href="galeria.html">Galeria</a>
        <a href="terminy.html">Terminy</a>
      </nav>
    </header>

    <main class="grid">
      <section class="card">
        <h2>News</h2>
        <p>Tu będą publikowane aktualności i informacje o nowych szkoleniach.</p>
      </section>

      <a class="news-link" href="szkolenie-shell.html" aria-label="Przejdź do podstrony Szkolenie w Shell">
        <section class="card news-thumb">
          <h3>Szkolenie w Shell</h3>
          <p>Kliknij, aby przejść do podstrony z opisem nowego szkolenia.</p>
        </section>
      </a>
    </main>
  </div>
</body>
</html>
